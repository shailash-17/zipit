name: ZipIt MLOps CI/CD

on:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install minimal deps
      run: |
        pip install fastapi uvicorn
    
    - name: Syntax check
      run: |
        python -m py_compile mlops_platform.py
        echo "✅ Syntax valid"
    
    - name: Success
      run: |
        echo "🚀 ZipIt MLOps Platform validated"
        echo "🌐 Ready for Railway deployment"