name: ZipIt MLOps CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install fastapi uvicorn sqlalchemy pydantic
        pip install pandas numpy scikit-learn
    
    - name: Test platform
      run: |
        python -c "import mlops_platform; print('✅ Platform imports OK')"
        python -c "from mlops_platform import app; print('✅ FastAPI app OK')"
    
    - name: Deploy to Railway
      if: github.ref == 'refs/heads/main'
      run: |
        echo "🚀 ZipIt MLOps Platform deployed"
        echo "🌐 Live at: https://zipit.up.railway.app"