name: ZipIt CI/CD Debug

on:
  push:
    branches: [ main ]

jobs:
  debug-environment:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Environment Info
      run: |
        echo "🔍 Environment Debug Info:"
        echo "Python version: $(python --version)"
        echo "Pip version: $(pip --version)"
        echo "Working directory: $(pwd)"
        echo "Files in repo:"
        ls -la
        echo "Requirements file exists:"
        ls -la requirements.txt || echo "requirements.txt not found"
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install Core Dependencies
      run: |
        echo "🔧 Installing core dependencies..."
        python -m pip install --upgrade pip
        pip install fastapi uvicorn sqlalchemy pydantic
        echo "✅ Core dependencies installed"
    
    - name: Install Requirements
      run: |
        echo "📦 Installing from requirements.txt..."
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt || echo "❌ Requirements installation failed"
        else
          echo "❌ requirements.txt not found"
        fi
    
    - name: Test Platform Import
      run: |
        echo "🧪 Testing platform import..."
        python -c "
        try:
            import mlops_platform
            print('✅ mlops_platform imported successfully')
        except ImportError as e:
            print(f'❌ Import error: {e}')
            exit(1)
        except Exception as e:
            print(f'❌ Other error: {e}')
            exit(1)
        "
    
    - name: Test FastAPI App
      run: |
        echo "🧪 Testing FastAPI app..."
        python -c "
        try:
            from mlops_platform import app
            print('✅ FastAPI app imported successfully')
        except Exception as e:
            print(f'❌ FastAPI app error: {e}')
            exit(1)
        "
    
    - name: Test Database
      run: |
        echo "🧪 Testing database setup..."
        python -c "
        try:
            from mlops_platform import Base, engine
            Base.metadata.create_all(bind=engine)
            print('✅ Database setup successful')
        except Exception as e:
            print(f'❌ Database error: {e}')
            exit(1)
        "
    
    - name: Test Health Endpoint
      run: |
        echo "🧪 Testing health endpoint..."
        python -c "
        try:
            from fastapi.testclient import TestClient
            from mlops_platform import app
            client = TestClient(app)
            response = client.get('/health')
            print(f'Health endpoint status: {response.status_code}')
            if response.status_code == 200:
                print('✅ Health endpoint working')
            else:
                print(f'❌ Health endpoint failed: {response.text}')
                exit(1)
        except Exception as e:
            print(f'❌ Health endpoint test error: {e}')
            exit(1)
        "
    
    - name: Success
      run: |
        echo "🎉 All diagnostic tests passed!"
        echo "✅ Platform is ready for deployment"